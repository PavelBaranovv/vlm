# Конфигурация дообучения llava-gemma-2b-lora
# Запуск: python scripts/train.py --config configs/train_config.yaml

model:
  name: deepvk/llava-gemma-2b-lora
  torch_dtype: float16

data:
  # Подвыборка для учебного проекта (полный датасет = долго)
  llava_instruct_samples: 10000
  gqa_train_samples: 8000
  # Путь к COCO train2014 (на Kaggle: /kaggle/input/coco-2014-dataset/train2014)
  # Локально оставьте null — будут использованы только GQA-ru
  coco_images_dir: null
  seed: 42

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: ./checkpoints/vk-vlm-finetuned
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  logging_steps: 25
  save_steps: 500
  save_total_limit: 2
  bf16: false
  fp16: true
  gradient_checkpointing: true
  max_seq_length: 512
  dataloader_num_workers: 2

gqa_post_prompt: "Ответь одним словом."
