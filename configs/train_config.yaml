model:
  name: Intel/llava-gemma-2b
  reference: deepvk/llava-gemma-2b-lora
  torch_dtype: float16

data:
  llava_instruct_samples: 10000
  gqa_train_samples: 8000
  coco_images_dir: null
  seed: 42

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  dataset_dir: data/processed/medium/train
  output_dir: checkpoints/intel-llava-gemma-2b-ru
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  logging_steps: 25
  save_steps: 500
  save_total_limit: 2
  fp16: true
  gradient_checkpointing: true
  max_seq_length: 512

gqa_post_prompt: "Ответь одним словом."
